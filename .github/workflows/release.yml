name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            release_file: TokenSaver-Setup.exe
          - os: macos-latest
            release_file: TokenSaver-macOS.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Windows installer tools
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install innosetup -y

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          python build_installer.py
          powershell -ExecutionPolicy Bypass -File installer\build_windows_installer.ps1

      - name: Build macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bash installer/build_macos_dmg.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.release_file }}
